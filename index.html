<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sonam Tuitions · Online Test Series</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root{
  --paper:#f6f3ec; --paper-2:#fffdf8; --ink:#23211c; --ink-soft:#5b574c;
  --line:#e2dccd; --line-2:#cfc7b3;
  --accent:#1f5c52; --accent-soft:#e6efe9; --accent-ink:#143f38;
  --gold:#b8893b; --danger:#a3402f; --danger-soft:#f6e7e2;
  --ok:#2f6b3a; --warn:#9a6b15;
  --shadow:0 1px 2px rgba(35,33,28,.05),0 8px 24px rgba(35,33,28,.07);
  --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Hanken Grotesk',system-ui,sans-serif;
  background:
    radial-gradient(900px 500px at 85% -10%, #eef3ee 0%, transparent 60%),
    radial-gradient(700px 500px at -5% 110%, #f1ece0 0%, transparent 55%),
    var(--paper);
  color:var(--ink); min-height:100vh; -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.serif{font-family:'Spectral',Georgia,serif}
button{font-family:inherit;cursor:pointer}
.hidden{display:none !important}
a{color:var(--accent)}

.auth-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
.auth-card{width:100%;max-width:410px;background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:34px 30px}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.brand .mark{width:42px;height:42px;border-radius:11px;background:var(--accent);color:#fff;display:grid;place-items:center;font-family:'Spectral';font-weight:700;font-size:22px}
.brand .mark span{transform:translateY(-1px)}
.brand h1{font-size:21px;margin:0;letter-spacing:.2px}
.brand .sub{font-size:12.5px;color:var(--ink-soft);margin-top:1px}
.auth-card h2{font-size:24px;margin:22px 0 4px}
.auth-card p.lede{color:var(--ink-soft);font-size:14px;margin:0 0 20px}
label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin:14px 0 6px;letter-spacing:.2px}
input,select,textarea{width:100%;padding:11px 13px;border:1px solid var(--line-2);border-radius:10px;background:#fff;font-size:15px;color:var(--ink);font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;border-radius:10px;border:1px solid transparent;font-weight:700;font-size:14.5px;background:var(--accent);color:#fff;transition:.15s}
.btn:hover{background:var(--accent-ink)}
.btn.full{width:100%;margin-top:18px}
.btn.ghost{background:transparent;color:var(--accent);border-color:var(--line-2)}
.btn.ghost:hover{background:var(--accent-soft);color:var(--accent-ink)}
.btn.sm{padding:7px 13px;font-size:13px;border-radius:8px}
.btn.danger{background:var(--danger)} .btn.danger:hover{background:#822f22}
.btn.gold{background:var(--gold)} .btn.gold:hover{background:#9a7330}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{margin-top:14px;font-size:13.5px;padding:10px 12px;border-radius:9px;display:none}
.msg.err{display:block;background:var(--danger-soft);color:#822f22}
.msg.ok{display:block;background:var(--accent-soft);color:var(--accent-ink)}

.app{display:none;min-height:100vh}
header.top{position:sticky;top:0;z-index:20;background:rgba(246,243,236,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:0 22px;display:flex;align-items:center;gap:16px;height:62px}
header .brand h1{font-size:17px}
header .brand .sub{display:none}
.spacer{flex:1}
.whoami{text-align:right;font-size:13px;line-height:1.3}
.whoami b{display:block;font-size:14px}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.4px;text-transform:uppercase}
.pill.master{background:#efe3cf;color:#7a5713}
.pill.admin{background:var(--accent-soft);color:var(--accent-ink)}
.pill.student{background:#e7ecf5;color:#2c4470}

.layout{display:flex;max-width:1180px;margin:0 auto;width:100%}
nav.side{width:218px;flex:none;padding:22px 14px;border-right:1px solid var(--line);min-height:calc(100vh - 62px)}
nav.side a{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:10px;color:var(--ink-soft);text-decoration:none;font-weight:600;font-size:14px;margin-bottom:3px;cursor:pointer}
nav.side a:hover{background:#efeadd;color:var(--ink)}
nav.side a.active{background:var(--accent);color:#fff}
nav.side .navlabel{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--line-2);margin:18px 0 7px 13px}
main.content{flex:1;padding:28px 30px;min-width:0}
.page-title{font-size:27px;margin:0 0 4px}
.page-sub{color:var(--ink-soft);margin:0 0 22px;font-size:14.5px}

.grid{display:grid;gap:16px}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-2{grid-template-columns:repeat(2,1fr)}
@media(max-width:900px){.cols-3,.cols-2{grid-template-columns:1fr}.layout{flex-direction:column}nav.side{width:auto;display:flex;flex-wrap:wrap;min-height:0;border-right:none;border-bottom:1px solid var(--line)}}
.card{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.card h3{margin:0 0 4px;font-size:18px}
.stat{font-family:'Spectral';font-size:34px;font-weight:600;color:var(--accent);line-height:1}
.stat .lbl{display:block;font-family:'Hanken Grotesk';font-size:12.5px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.muted{color:var(--ink-soft);font-size:13.5px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.row.end{justify-content:flex-end}
.bar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:18px}
.bar .grow{flex:1;min-width:160px}

table{width:100%;border-collapse:collapse;font-size:14px}
th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line)}
th{font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-soft);font-weight:700}
tr:last-child td{border-bottom:none}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.3px}
.tag.live{background:var(--accent-soft);color:var(--accent-ink)}
.tag.pending{background:#f6eede;color:var(--warn)}
.tag.phy{background:#e7ecf5;color:#2c4470}.tag.chem{background:#f3e8ee;color:#7a2f57}
.tag.math{background:#e9f1e7;color:#33602f}.tag.bio{background:#eaf0e2;color:#4d6322}
.tag.bot{background:#e7f0e4;color:#3c6b2f}.tag.zoo{background:#f0ece1;color:#6b551f}
.tag.exam{background:#ece3f0;color:#5a3a73}
.tag.scheduled{background:#e7ecf5;color:#2c4470}.tag.open{background:var(--accent-soft);color:var(--accent-ink)}
.tag.closed{background:#ece9e0;color:var(--ink-soft)}

.modal-bg{position:fixed;inset:0;background:rgba(35,33,28,.46);display:none;place-items:center;z-index:90;padding:20px;overflow:auto}
.modal-bg.show{display:grid}
.modal{background:var(--paper-2);border-radius:16px;max-width:560px;width:100%;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:90vh;overflow:auto}
.modal.wide{max-width:760px}
.modal h2{margin:0 0 16px;font-size:22px}
.modal .x{float:right;background:none;border:none;font-size:22px;color:var(--ink-soft);line-height:1;margin-top:-6px}

.exam{display:none;position:fixed;inset:0;background:var(--paper);z-index:80;overflow:auto}
.exam .ebar{position:sticky;top:0;background:var(--accent);color:#fff;padding:0 22px;height:60px;display:flex;align-items:center;gap:18px;z-index:5}
.exam .ebar h2{margin:0;font-size:17px;color:#fff}
.timer{font-family:'Spectral';font-size:22px;font-weight:600;background:rgba(255,255,255,.16);padding:5px 14px;border-radius:9px;letter-spacing:1px}
.timer.low{background:var(--danger);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.6}}
.exam-body{max-width:1080px;margin:0 auto;display:flex;gap:24px;padding:26px 22px}
.q-main{flex:1;min-width:0}
.q-card{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:26px;box-shadow:var(--shadow)}
.q-meta{font-size:12.5px;color:var(--ink-soft);font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px}
.q-text{font-size:18px;line-height:1.55;margin:0 0 22px;font-weight:500}
.opt{display:flex;gap:13px;align-items:flex-start;padding:14px 16px;border:1.5px solid var(--line-2);border-radius:11px;margin-bottom:11px;cursor:pointer;transition:.12s;background:#fff}
.opt:hover{border-color:var(--accent)}
.opt.sel{border-color:var(--accent);background:var(--accent-soft)}
.opt .k{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line-2);display:grid;place-items:center;font-weight:700;font-size:13px;flex:none}
.opt.sel .k{background:var(--accent);color:#fff;border-color:var(--accent)}
.opt.correct{border-color:var(--ok);background:#e9f1e7}.opt.correct .k{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt.wrong{border-color:var(--danger);background:var(--danger-soft)}.opt.wrong .k{background:var(--danger);color:#fff;border-color:var(--danger)}
.q-side{width:240px;flex:none}
.palette{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:18px;position:sticky;top:84px}
.palette h4{margin:0 0 12px;font-size:13px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-soft)}
.pgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.pgrid button{aspect-ratio:1;border-radius:8px;border:1.5px solid var(--line-2);background:#fff;font-weight:700;font-size:13px;color:var(--ink-soft)}
.pgrid button.cur{outline:2px solid var(--accent);outline-offset:1px}
.pgrid button.answered{background:var(--accent);color:#fff;border-color:var(--accent)}
.pgrid button.review{background:var(--gold);color:#fff;border-color:var(--gold)}
.legend{font-size:12px;color:var(--ink-soft);margin-top:14px;line-height:1.9}
.legend .dot{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:6px;vertical-align:-1px}
.solution{margin-top:16px;padding:16px;border-radius:11px;background:var(--accent-soft);border:1px solid #cfe0d7;font-size:14.5px;line-height:1.55}
.solution b{color:var(--accent-ink)}

.score-hero{text-align:center;padding:30px 20px;background:var(--paper-2);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin-bottom:22px}
.score-hero .big{font-family:'Spectral';font-size:64px;font-weight:600;color:var(--accent);line-height:1}
.score-hero .big small{font-size:28px;color:var(--ink-soft)}
.score-hero .pct{font-size:17px;color:var(--ink-soft);margin-top:6px}
.skpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.kpi{background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
.kpi .n{font-family:'Spectral';font-size:26px;font-weight:600}
.kpi .l{font-size:12px;color:var(--ink-soft);font-weight:600}
.kpi.c .n{color:var(--ok)} .kpi.w .n{color:var(--danger)} .kpi.u .n{color:var(--ink-soft)}

.empty{text-align:center;padding:46px 20px;color:var(--ink-soft)}
.empty .ico{font-size:36px;opacity:.5}
.loader{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.note{font-size:12.5px;color:var(--warn);background:#f8f1df;border:1px solid #ecdcb4;padding:9px 12px;border-radius:9px;margin-top:10px}
hr.sep{border:none;border-top:1px solid var(--line);margin:22px 0}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div class="auth-wrap" id="authWrap">
  <div class="auth-card">
    <div class="brand"><div class="mark"><span>S</span></div>
      <div><h1>Sonam Tuitions</h1><div class="sub">Online Test Series · MHT-CET / JEE Main / NEET</div></div></div>
    <h2>Sign in</h2>
    <p class="lede">Use the email &amp; password issued by your centre.</p>
    <label>Email or Login ID</label><input type="text" id="loginEmail" placeholder="your email or username" autocomplete="username"/>
    <label>Password</label><input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"/>
    <button class="btn full" id="loginBtn" onclick="doLogin()">Sign in</button>
    <div class="msg" id="authMsg"></div>
    <p class="muted" style="margin-top:18px;text-align:center;font-size:12.5px">
      First-time setup? Open the browser console and run <code>bootstrapMaster()</code> once.</p>
  </div>
</div>

<!-- ============ APP ============ -->
<div class="app" id="app">
  <header class="top">
    <div class="brand"><div class="mark"><span>S</span></div><div><h1>Sonam Tuitions</h1></div></div>
    <div class="spacer"></div>
    <div class="whoami"><b id="meName">—</b><span id="meRole"></span></div>
    <button class="btn ghost sm" onclick="openChangePassword()">Password</button>
    <button class="btn ghost sm" onclick="doLogout()">Sign out</button>
  </header>
  <div class="layout"><nav class="side" id="sideNav"></nav><main class="content" id="view"></main></div>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal" id="modalBox"></div></div>

<!-- ============ EXAM SCREEN ============ -->
<div class="exam" id="examScreen">
  <div class="ebar"><h2 id="examTitle">Test</h2><div class="spacer"></div>
    <div class="timer" id="examTimer">--:--</div>
    <button class="btn gold sm" id="submitBtn" onclick="confirmSubmit()">Submit test</button></div>
  <div class="exam-body">
    <div class="q-main">
      <div class="q-card" id="qCard"></div>
      <div class="row" style="margin-top:18px;justify-content:space-between">
        <button class="btn ghost" onclick="navQ(-1)">‹ Previous</button>
        <div class="row">
          <button class="btn ghost" id="reviewBtn" onclick="toggleReview()">Mark for review</button>
          <button class="btn" onclick="navQ(1)">Save &amp; Next ›</button></div></div>
    </div>
    <div class="q-side"><div class="palette"><h4>Questions</h4><div class="pgrid" id="palette"></div>
      <div class="legend">
        <div><span class="dot" style="background:var(--accent)"></span>Answered</div>
        <div><span class="dot" style="background:var(--gold)"></span>Marked for review</div>
        <div><span class="dot" style="background:#fff;border:1.5px solid var(--line-2)"></span>Not visited</div>
      </div></div></div>
  </div>
</div>

<script>
/* ============================================================
   1. FIREBASE CONFIG  — replace with your project's config
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyBCqeyIezHGgTh5oXjaM4SZ9fxRA5QT3e0",
  authDomain: "sonam-tests.firebaseapp.com",
  projectId: "sonam-tests",
  storageBucket: "sonam-tests.firebasestorage.app",
  messagingSenderId: "195991189268",
  appId: "1:195991189268:web:43fa213463ff1a7edb3401"
};
const AI_FUNCTION_URL = "https://asia-south1-sonam-tests.cloudfunctions.net/generateQuestion"; // set after deploying functions/

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
const secondaryApp = firebase.initializeApp(firebaseConfig, "secondary");

/* ============================================================
   2. EXAM PATTERNS — all three exams encoded here
   ============================================================ */
const EXAMS = {
  "MHT-CET": {
    streams:{ PCM:["Physics","Chemistry","Mathematics"], PCB:["Physics","Chemistry","Biology"] },
    marks:{Physics:1,Chemistry:1,Mathematics:2,Biology:1}, negative:0,
    full:{Physics:50,Chemistry:50,Mathematics:50,Biology:50}, fullDuration:180,
    note:"No negative marking · Maths 2 marks, Physics/Chemistry/Biology 1 mark each"
  },
  "JEE Main": {
    streams:{ PCM:["Physics","Chemistry","Mathematics"] },
    marks:{Physics:4,Chemistry:4,Mathematics:4}, negative:1,
    full:{Physics:25,Chemistry:25,Mathematics:25}, fullDuration:180,
    note:"+4 for correct, −1 for wrong, 0 if skipped"
  },
  "NEET": {
    streams:{ PCB:["Physics","Chemistry","Botany","Zoology"] },
    marks:{Physics:4,Chemistry:4,Botany:4,Zoology:4}, negative:1,
    full:{Physics:45,Chemistry:45,Botany:45,Zoology:45}, fullDuration:200,
    note:"+4 for correct, −1 for wrong, 0 if skipped"
  }
};
const EXAM_KEYS = Object.keys(EXAMS);
function examSubjects(exam){const s=new Set();Object.values(EXAMS[exam].streams).forEach(a=>a.forEach(x=>s.add(x)));return [...s];}
function examMarks(exam,subject){return (EXAMS[exam]&&EXAMS[exam].marks[subject])||1;}
function examNeg(exam){return (EXAMS[exam]&&EXAMS[exam].negative)||0;}
function streamsFor(exam){return Object.keys(EXAMS[exam].streams);}
function examsForStream(stream){return EXAM_KEYS.filter(k=>EXAMS[k].streams[stream]);}
function qLabel(q){return esc(q.text)+(q.year?` <b style="color:var(--gold)">(${q.year})</b>`:"");}
function confirmModal(message,onYes,yesLabel){
  modal(`<h2 style="font-size:20px">${esc(message)}</h2>
    <div class="row end" style="margin-top:20px;gap:12px">
      <button class="btn ghost" onclick="closeModal()">No</button>
      <button class="btn" id="cfYes">${esc(yesLabel||"Yes")}</button></div>`);
  el("cfYes").onclick=()=>{closeModal();onYes();};
}
function scopeClasses(v){return v==="both"?["11","12"]:[v];}
// Pull live question IDs for one subject across given classes & chapters.
async function pullQuestions({exam,subject,classes,chapters,count,diffs}){
  let q=db.collection("questions").where("status","==","live").where("exam","==",exam).where("subject","==",subject);
  if(classes.length===1) q=q.where("class","==",classes[0]);
  const snap=await q.get();
  let docs=snap.docs.filter(d=>{const x=d.data();
    if(classes.length>1 && !classes.includes(x.class)) return false;
    if(chapters && chapters.length && !chapters.includes(x.topic)) return false;
    if(diffs && diffs.length && !diffs.includes(x.difficulty)) return false;
    return true;});
  return shuffle(docs.map(d=>d.id)).slice(0,count);
}

const CENTRES = [
  {id:"AMB", name:"Ambernath"}, {id:"UNR3", name:"Ulhasnagar 3"},
  {id:"UNR5", name:"Ulhasnagar 5"}, {id:"KE", name:"Kalyan East"},
  {id:"KW", name:"Kalyan West"}, {id:"KHP", name:"Khopoli"}
];
const centreName = id => id==="all" ? "All centres" : (CENTRES.find(c=>c.id===id)?.name || id);

// Students log in with a simple username (no email needed). It's turned into this
// behind-the-scenes address so Firebase login still works.
const STUDENT_LOGIN_DOMAIN = "sonamtuitions.app";
const toLoginEmail = id => id.includes("@") ? id : id.toLowerCase()+"@"+STUDENT_LOGIN_DOMAIN;

const ALL_SUBJECTS = ["Physics","Chemistry","Mathematics","Biology","Botany","Zoology"];
const DIFFICULTIES = ["Easy","Easy-Moderate","Moderate","Moderate-Difficult","Difficult","Previous Year"];
const TOPICS = {
  Physics:["Laws of Motion","Electrostatics","Current Electricity","Optics","Rotational Motion","Magnetism","Thermodynamics","Modern Physics"],
  Chemistry:["Chemical Bonding","Solutions","Electrochemistry","Coordination Compounds","Hydrocarbons","Thermodynamics","p-Block Elements","Aldehydes & Ketones"],
  Mathematics:["Trigonometry","Vectors","Probability","Matrices","Integration","Differentiation","Straight Lines","Complex Numbers"],
  Biology:["Cell Biology","Genetics","Human Physiology","Plant Physiology","Biomolecules","Reproduction"],
  Botany:["Cell Structure & Function","Plant Kingdom","Photosynthesis","Plant Physiology","Genetics & Evolution","Biomolecules","Reproduction in Plants","Ecology"],
  Zoology:["Human Physiology","Animal Kingdom","Cell Division","Human Reproduction","Biotechnology","Evolution","Human Health & Disease","Neural Control & Coordination"]
};

let ME = null, CURRENT_PAGE = null;
let SYLLABUS = {}; // custom chapter lists, keyed by "exam|class|subject"

/* ============================================================
   3. AUTH
   ============================================================ */
function doLogin(){
  const id=val("loginEmail").trim(), pass=val("loginPass");
  if(!id||!pass) return authMsg("Enter your email/username and password.","err");
  const email=toLoginEmail(id);
  setBtn("loginBtn",true,"Signing in…");
  auth.signInWithEmailAndPassword(email,pass).catch(e=>{authMsg(prettyAuthErr(e),"err");setBtn("loginBtn",false,"Sign in");});

function synKey(exam,cls,subj){return `${exam}|${cls}|${subj}`;}
function synDocId(exam,cls,subj){return (exam+"_"+cls+"_"+subj).replace(/[^A-Za-z0-9]+/g,"_");}
function topicsFor(exam,cls,subj){
  const k=synKey(exam,cls,subj);

}

async function aiGenerate(payload){
  const token=await auth.currentUser.getIdToken();
  const res=await fetch(AI_FUNCTION_URL,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify(payload)});
  if(!res.ok){ let m="server returned "+res.status; try{const j=await res.json(); if(j&&(j.message||j.error)) m=j.message||j.error;}catch(_){} throw new Error(m); }
  const data=await res.json(); return data.questions||[];
}
// Fetch many questions in safe sub-batches so the AI reply never gets cut off.
async function aiGenerateMany(payload,total,onProgress){
  const CHUNK=12; let all=[];
  for(let got=0;got<total;got+=CHUNK){
    const n=Math.min(CHUNK,total-got);
    const items=await aiGenerate({...payload,count:n});
    all=all.concat(items);
    if(onProgress) onProgress(all.length,total);
    if(!items.length) break; // nothing came back — stop rather than loop pointlessly
  }
  return all;
}
async function saveDrafts(items,meta){
  const batch=db.batch();
  items.forEach(it=>{const ref=db.collection("questions").doc();
    batch.set(ref,{exam:meta.exam,subject:meta.subject,topic:meta.topic,class:meta.cls,difficulty:meta.difficulty,
      text:it.question,options:it.options,correct:it.correctIndex,solution:it.solution,year:it.year||null,
      status:"pending",source:"ai",createdBy:ME.uid,centreId:ME.role==="admin"?ME.centreId:"all",
      createdAt:firebase.firestore.FieldValue.serverTimestamp()});});
  await batch.commit();
}
async function runAIGen(){
  if(AI_FUNCTION_URL.startsWith("PASTE")) return setMsg("genMsg","Deploy the Cloud Function first.","err");
  const meta={exam:val("gExam"),subject:val("gSubject"),cls:val("gClass"),topic:val("gTopic"),difficulty:val("gDiff")};

  try{

    if(!items.length) throw new Error("No questions returned.");
    await saveDrafts(items,meta);
    setMsg("genMsg",`✓ ${items.length} draft questions created. Approve them in the Review queue.`,"ok");

}

async function runAIGenAll(){
  if(AI_FUNCTION_URL.startsWith("PASTE")) return setMsg("gaMsg","Deploy the Cloud Function first.","err");
  const exam=val("gaExam"),cls=val("gaClass"),subject=val("gaSubject"),difficulty=val("gaDiff");

  if(!chapters.length) return setMsg("gaMsg","No chapters for this combination. Add them in Syllabus first.","err");

function downloadTemplate(){
  try{ const bin=atob(TEMPLATE_DOCX_B64); const bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    const blob=new Blob([bytes],{type:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a");
    a.href=url; a.download="Question_Bank_Template.docx"; document.body.appendChild(a); a.click();
    a.remove(); URL.revokeObjectURL(url);
  }catch(e){ alert("Could not download template: "+e.message); }
}

async function handleUploadFile(){
  const f=el("uFile").files[0]; if(!f) return;
  setMsg("uMsg","Reading file…","ok"); el("uPreview").innerHTML=""; el("uImportBtn").disabled=true;
  try{
    let raw;
    if(f.name.toLowerCase().endsWith(".docx")){
      if(typeof mammoth==="undefined") throw new Error("Word reader didn't load — check your internet and reload.");
      raw=(await mammoth.extractRawText({arrayBuffer:await f.arrayBuffer()})).value;
    } else { raw=await f.text(); }
    const defaults={exam:val("uExam"),subject:val("uSubject"),cls:val("uClass"),topic:val("uTopic"),difficulty:val("uDiff")};
    UPLOAD_PARSED=parseQuestionsFromText(raw,defaults);
    const ok=UPLOAD_PARSED.filter(q=>!q.problems.length), bad=UPLOAD_PARSED.filter(q=>q.problems.length);
    if(!UPLOAD_PARSED.length){ setMsg("uMsg","No questions found. Check the file follows the format shown above.","err"); return; }
    setMsg("uMsg",`Found ${UPLOAD_PARSED.length} question(s): ${ok.length} ready${bad.length?`, ${bad.length} with problems (skipped)`:""}.`, bad.length?"err":"ok");
    el("uImportBtn").disabled=ok.length===0; el("uImportBtn").textContent=`Import ${ok.length} question${ok.length===1?"":"s"}`;
    el("uPreview").innerHTML=`<div style="max-height:240px;overflow:auto;margin-top:12px;border:1px solid var(--line);border-radius:10px;padding:10px">`
      +UPLOAD_PARSED.map((q,i)=>{const b=q.problems.length;
        return `<div style="padding:8px 4px;border-bottom:1px solid var(--line)">
          <div style="font-size:13px">${b?'⚠️ ':'✓ '}<b>Q${i+1}.</b> ${esc(truncate(q.text||"(no text)",70))}</div>
          <div class="muted" style="font-size:11.5px">${esc(q.subject||"?")} · ${esc(q.topic||"?")} · answer ${q.correct!=null?"ABCD"[q.correct]:"—"}${b?` · <span style="color:var(--danger)">${q.problems.join(", ")}</span>`:""}</div></div>`;}).join("")+`</div>`;
  }catch(e){ setMsg("uMsg","Could not read file: "+errMsg(e),"err"); }
}
function parseQuestionsFromText(raw,defaults){
  const lines=raw.split(/\r?\n/).map(l=>l.trim());
  const out=[]; let ctx={...defaults}; let cur=null, mode=null;
  const headerRe=/^(EXAM|SUBJECT|CLASS|TOPIC|DIFFICULTY)\s*[:\-]\s*(.+)$/i;
  const qRe=/^Q\s*[:.)]\s*(.*)$/i, optRe=/^([A-D])\s*[).]\s*(.*)$/i;
  const ansRe=/^ANS(?:WER)?\s*[:\-]\s*([A-D1-4])/i, solRe=/^SOL(?:UTION)?\s*[:\-]\s*(.*)$/i, yearRe=/^YEAR\s*[:\-]\s*(\d{4})/i;
  const push=()=>{ if(!cur)return; const p=[];
    if(!cur.text)p.push("no question text");
    if(cur.options.filter(o=>o&&o.trim()).length<4)p.push("needs 4 options");
    if(cur.correct==null)p.push("no/invalid ANSWER");
    cur.problems=p; out.push(cur); cur=null; mode=null; };
  for(const line of lines){
    if(!line) continue; let m;
    if(m=line.match(headerRe)){ const k=m[1].toUpperCase(),v=m[2].trim();
      if(k==="EXAM")ctx.exam=v; else if(k==="SUBJECT")ctx.subject=v;
      else if(k==="CLASS")ctx.cls=(v.match(/\d+/)||[v])[0]; else if(k==="TOPIC")ctx.topic=v; else if(k==="DIFFICULTY")ctx.difficulty=v; continue; }
    if(m=line.match(qRe)){ push();
      cur={exam:ctx.exam,subject:ctx.subject,class:ctx.cls,topic:ctx.topic,difficulty:ctx.difficulty,year:null,text:m[1]||"",options:["","","",""],correct:null,solution:""}; mode="q"; continue; }
    if(cur&&(m=line.match(optRe))){ const i="ABCD".indexOf(m[1].toUpperCase()); if(i>=0)cur.options[i]=m[2]; mode="opt"; continue; }
    if(cur&&(m=line.match(ansRe))){ const a=m[1].toUpperCase(); cur.correct="ABCD".includes(a)?"ABCD".indexOf(a):(parseInt(a)-1); if(cur.correct<0||cur.correct>3)cur.correct=null; mode="ans"; continue; }
    if(cur&&(m=line.match(yearRe))){ cur.year=parseInt(m[1]); mode="year"; continue; }
    if(cur&&(m=line.match(solRe))){ cur.solution=m[1]||""; mode="sol"; continue; }
    if(cur){ if(mode==="sol")cur.solution+=(cur.solution?" ":"")+line; else if(mode==="q")cur.text+=(cur.text?" ":"")+line; }
  }
  push(); return out;
}
async function doImport(){
  const ok=UPLOAD_PARSED.filter(q=>!q.problems.length); if(!ok.length) return;
  setBtn("uImportBtn",true,"Importing…");
  try{
    for(let i=0;i<ok.length;i+=400){
      const chunk=ok.slice(i,i+400), batch=db.batch();
      chunk.forEach(q=>{ const ref=db.collection("questions").doc();
        batch.set(ref,{exam:q.exam,subject:q.subject,topic:q.topic,class:q.class,difficulty:q.difficulty,
          text:q.text,options:q.options,correct:q.correct,solution:q.solution,year:q.year||null,status:"live",source:"upload",
          createdBy:ME.uid,centreId:ME.role==="admin"?ME.centreId:"all",createdAt:firebase.firestore.FieldValue.serverTimestamp()}); });
      await batch.commit();
    }
    setMsg("uMsg",`✓ Imported ${ok.length} question(s) into the live bank.`,"ok");
    setTimeout(()=>{closeModal(); if(CURRENT_PAGE==="questions")loadQuestions();},1200);
  }catch(e){ setMsg("uMsg",errMsg(e),"err"); setBtn("uImportBtn",false,"Import questions"); }
}

async function loadReview(){
  try{
    const snap=await db.collection("questions").where("status","==","pending").orderBy("createdAt","desc").limit(50).get();
    if(snap.empty){ el("revList").innerHTML=`<div class="card">${emptyState("Queue is clear","No drafts waiting for approval. 🎉")}</div>`; return; }
    el("revList").innerHTML=`<div class="bar"><div class="muted grow">${snap.size} draft${snap.size===1?"":"s"} waiting${snap.size>=50?"+ (showing first 50)":""}.</div>
        <button class="btn" onclick="approveAll()">✓ Approve all</button></div>`
      +snap.docs.map(d=>reviewCard(d.id,d.data())).join("");
  }catch(e){ el("revList").innerHTML=errBox(e); }
}
async function approveAll(){
  if(!confirm("Approve ALL pending questions and make them live for students?")) return;
  try{
    const snap=await db.collection("questions").where("status","==","pending").get();
    const docs=snap.docs; if(!docs.length){ loadReview(); return; }
    for(let i=0;i<docs.length;i+=400){
      const batch=db.batch();
      docs.slice(i,i+400).forEach(d=>batch.update(d.ref,{status:"live",approvedBy:ME.uid,approvedAt:firebase.firestore.FieldValue.serverTimestamp()}));
      await batch.commit();
    }
    loadReview();
  }catch(e){ alert("Could not approve all: "+errMsg(e)); }
}

      <label>Number of questions (across all chapters)</label><input id="tQcount" type="number" min="1" value="30"/>`;
  } else {

    html=`<div><label>Class scope</label>${clsScopeSelect("tScopeCls")}</div>
      <div class="note" style="color:var(--ink-soft);background:#eef3ee;border-color:#cfe0d7">Full ${esc(exam)} paper: ${Object.entries(full).map(([s,n])=>`${s} ${n}`).join(" · ")} — total <b>${Object.values(full).reduce((a,b)=>a+b,0)}</b> questions, drawn from all your saved chapters.</div>`;

  else if(type==="subject"){ fillSubjects("tExam","tSubj",false); }
  else { el("tDur").value=EXAMS[exam].fullDuration; }

  const list=topicsFor(val("tExam"),val("tCls"),val("tSubj"));
  el("tChaps").innerHTML=list.length
    ? list.map(c=>`<label style="margin:0;display:flex;gap:6px;align-items:center;width:48%"><input type="checkbox" class="tchap" value="${esc(c)}" checked style="width:auto"/> ${esc(c)}</label>`).join("")
    : `<span class="muted">No chapters saved — add them in Syllabus first.</span>`;

async function createTest(){
  const title=val("tTitle").trim(),exam=val("tExam"),type=val("tType");
  const scope=ME.role==="master"?val("tScope"):ME.centreId;
  if(!title) return setMsg("tMsg","Add a title.","err");
  setBtn("tSaveBtn",true,"Building…");
  try{
    const diffs=[...document.querySelectorAll(".tdiff:checked")].map(c=>c.value);
    let questionIds=[],subjects=[],cls="",short=[];
    if(type==="chapter"){
      const subject=val("tSubj"),chapters=[...document.querySelectorAll(".tchap:checked")].map(c=>c.value);
      const count=Math.max(1,parseInt(val("tQcount"))||20);
      if(!chapters.length) throw new Error("Tick at least one chapter.");
      questionIds=await pullQuestions({exam,subject,classes:[val("tCls")],chapters,count,diffs});
      if(questionIds.length<count) short.push(`${subject}: ${questionIds.length}/${count}`);
      subjects=[subject]; cls=val("tCls");
    } else if(type==="subject"){
      const subject=val("tSubj"),classes=scopeClasses(val("tScopeCls")),count=Math.max(1,parseInt(val("tQcount"))||30);
      questionIds=await pullQuestions({exam,subject,classes,count,diffs});
      if(questionIds.length<count) short.push(`${subject}: ${questionIds.length}/${count}`);
      subjects=[subject]; cls=val("tScopeCls");
    } else {
      const classes=scopeClasses(val("tScopeCls")),full=EXAMS[exam].full;
      for(const s of Object.keys(full)){
        const ids=await pullQuestions({exam,subject:s,classes,count:full[s],diffs});
        if(ids.length<full[s]) short.push(`${s}: ${ids.length}/${full[s]}`);
        questionIds.push(...ids); subjects.push(s);
      }
      cls=val("tScopeCls");
    }
    if(!questionIds.length) throw new Error("No matching questions in the bank yet. Generate/approve more first.");
    await db.collection("tests").add({title,exam,type,subjects,class:cls,questionIds,duration:parseInt(val("tDur"))||30,scope,isPractice:false,
      startAt:val("tStart")?firebase.firestore.Timestamp.fromDate(new Date(val("tStart"))):null,
      endAt:val("tEnd")?firebase.firestore.Timestamp.fromDate(new Date(val("tEnd"))):null,
      createdBy:ME.uid,createdByRole:ME.role,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    closeModal(); loadTests();
    if(short.length) setTimeout(()=>alert("Test created. Some parts had fewer questions than requested:\n"+short.join("\n")+"\nGenerate more to fill them next time."),200);
  }catch(e){ setMsg("tMsg",errMsg(e),"err"); setBtn("tSaveBtn",false,"Create & schedule"); }
}

let BULK_ROWS=[];
async function bulkPreview(){
  const f=el("bFile").files[0]; if(!f) return;
  el("bPreview").innerHTML=""; el("bBtn").disabled=true; setMsg("bMsg","Reading file…","ok");
  try{
    const wb=XLSX.read(await f.arrayBuffer(),{type:"array"});
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});
    const out=[]; 
    rows.forEach(r=>{
      const get=k=>{const key=Object.keys(r).find(x=>x.trim().toLowerCase()===k); return key?String(r[key]).trim():"";};
      const name=get("name"); if(!name) return;
      let cls=(get("class").match(/\d+/)||[""])[0]; if(cls!=="11"&&cls!=="12")cls="11";
      let stream=get("stream").toUpperCase(); if(stream!=="PCM"&&stream!=="PCB")stream="PCM";
      let centre=get("centre").toUpperCase();
      if(ME.role==="admin") centre=ME.centreId;
      else if(!CENTRES.find(c=>c.id===centre)) centre=""; // resolve at run time to default
      out.push({name,cls,stream,centre});
    });
    BULK_ROWS=out;
    if(!out.length){ setMsg("bMsg","No student rows found. Check the column headings.","err"); return; }
    setMsg("bMsg",`Found ${out.length} student(s) ready to create.`,"ok");
    el("bBtn").disabled=false; el("bBtn").textContent=`Create ${out.length} login${out.length===1?"":"s"}`;
    el("bPreview").innerHTML=`<div style="max-height:200px;overflow:auto;margin-top:12px;border:1px solid var(--line);border-radius:10px">`+

function genLoginId(name){ const base=(name.toLowerCase().replace(/[^a-z]/g,"")||"student").slice(0,9); return base+Math.floor(100+Math.random()*900); }
function genPassword(){ const c="abcdefghjkmnpqrstuvwxyz23456789"; let p=""; for(let i=0;i<7;i++)p+=c[Math.floor(Math.random()*c.length)]; return p; }
async function runBulkStudents(){
  if(!BULK_ROWS.length) return;
  setBtn("bBtn",true,`<span class="loader"></span> Creating…`);
  const created=[]; const fails=[]; const defCentre=ME.role==="master"?val("bDefCentre"):ME.centreId;
  for(let i=0;i<BULK_ROWS.length;i++){
    const r=BULK_ROWS[i]; const centreId=r.centre||defCentre;
    el("bProgress").innerHTML=`<div class="muted" style="font-size:13px;margin-top:8px">Creating ${i+1} of ${BULK_ROWS.length}: ${esc(r.name)}…</div>`;
    let done=false;
    for(let attempt=0;attempt<3 && !done;attempt++){
      const loginId=genLoginId(r.name), pass=genPassword();
      try{
        const cred=await secondaryApp.auth().createUserWithEmailAndPassword(toLoginEmail(loginId),pass);
        await db.collection("users").doc(cred.user.uid).set({role:"student",name:r.name,loginId,email:toLoginEmail(loginId),pw:pass,
          class:r.cls,stream:r.stream,centreId,createdBy:ME.uid,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
        await secondaryApp.auth().signOut();
        created.push({Name:r.name,"Login ID":loginId,Password:pass,Class:r.cls,Stream:r.stream,Centre:centreName(centreId)});
        done=true;
      }catch(e){ if(!/email-already-in-use/.test(e.code||"")){ fails.push({name:r.name,reason:errMsg(e)}); break; } }
    }
    if(!done && !fails.find(x=>x.name===r.name)) fails.push({name:r.name,reason:"could not pick a unique login ID"});
  }
  // build the credentials Excel
  if(created.length){
    const ws=XLSX.utils.json_to_sheet(created,{header:["Name","Login ID","Password","Class","Stream","Centre"]});
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Logins");
    XLSX.writeFile(wb,"Student_Logins_"+new Date().toISOString().slice(0,10)+".xlsx");
  }
  setMsg("bMsg",`✓ Created ${created.length} login(s)${fails.length?`, ${fails.length} failed (${fails.map(f=>esc(f.name)).join(", ")})`:""}. The credentials Excel has downloaded — share it with students.`, fails.length?"err":"ok");
  setBtn("bBtn",false,"Create logins"); loadStudents();
}

/* ============================================================
   12. EXAM ENGINE (exam-aware scoring + negative marking)
   ============================================================ */
let EXAM=null;
async function startTest(testId){ const doc=await db.collection("tests").doc(testId).get(); launchExam({id:testId,...doc.data()},false); }
async function launchExam(test,isPractice){
  const qDocs=await Promise.all(test.questionIds.map(id=>db.collection("questions").doc(id).get()));
  let questions=qDocs.filter(d=>d.exists).map(d=>({id:d.id,...d.data()}));
  questions=shuffle(questions); // randomised per attempt — no two students see the same order
  if(!questions.length){ alert("This test has no available questions."); return; }
  EXAM={test,questions,answers:{},review:new Set(),cur:0,isPractice,endTime:Date.now()+test.duration*60*1000};
  el("examTitle").textContent=test.title;
  el("examScreen").style.display="block"; document.body.style.overflow="hidden";
  renderPalette(); renderQ(); startTimer();
}
function startTimer(){
  clearInterval(EXAM.timerInt);
  EXAM.timerInt=setInterval(()=>{
    const left=Math.max(0,EXAM.endTime-Date.now());
    const m=Math.floor(left/60000),s=Math.floor((left%60000)/1000);
    const t=el("examTimer"); t.textContent=`${pad(m)}:${pad(s)}`; t.classList.toggle("low",left<60000);
    if(left<=0){ clearInterval(EXAM.timerInt); submitExam(true); }
  },500);
}
function renderQ(){
  const i=EXAM.cur,q=EXAM.questions[i],sel=EXAM.answers[i],m=examMarks(EXAM.test.exam,q.subject);
  el("qCard").innerHTML=`<div class="q-meta">Question ${i+1} of ${EXAM.questions.length} · ${q.subject} · ${m} mark${m>1?"s":""}${examNeg(EXAM.test.exam)?` · −${examNeg(EXAM.test.exam)} if wrong`:""}</div>
    <p class="q-text">${qLabel(q)}</p>
    <div id="opts">${q.options.map((o,k)=>`<div class="opt ${sel===k?'sel':''}" onclick="pick(${k})"><div class="k">${"ABCD"[k]}</div><div>${esc(o)}</div></div>`).join("")}</div>`;
  el("reviewBtn").textContent=EXAM.review.has(i)?"Unmark review":"Mark for review"; renderPalette();
}
function pick(k){ EXAM.answers[EXAM.cur]=k; renderQ(); }
function navQ(d){ const n=EXAM.cur+d; if(n>=0&&n<EXAM.questions.length){EXAM.cur=n;renderQ();} }
function toggleReview(){ EXAM.review.has(EXAM.cur)?EXAM.review.delete(EXAM.cur):EXAM.review.add(EXAM.cur); renderQ(); }
function renderPalette(){
  el("palette").innerHTML=EXAM.questions.map((_,i)=>{let cls="";if(EXAM.review.has(i))cls="review";else if(EXAM.answers[i]!==undefined)cls="answered";if(i===EXAM.cur)cls+=" cur";
    return `<button class="${cls}" onclick="EXAM.cur=${i};renderQ()">${i+1}</button>`;}).join("");
}
function confirmSubmit(){
  const ans=Object.keys(EXAM.answers).length,tot=EXAM.questions.length;
  confirmModal(`Do you want to submit the test? (${ans} of ${tot} answered)`, ()=>submitExam(false), "Yes, submit");
}
async function submitExam(auto){
  clearInterval(EXAM.timerInt);
  const exam=EXAM.test.exam,neg=examNeg(exam);
  let score=0,correct=0,wrong=0,unattempted=0;
  const order=EXAM.questions.map(q=>q.id);
  const answers=EXAM.questions.map((q,i)=>EXAM.answers[i]===undefined?null:EXAM.answers[i]);
  EXAM.questions.forEach((q,i)=>{const sel=EXAM.answers[i],m=examMarks(exam,q.subject);
    if(sel===undefined){unattempted++;}
    else if(sel===q.correct){score+=m;correct++;}
    else{score-=neg;wrong++;}});
  const total=EXAM.questions.reduce((s,q)=>s+examMarks(exam,q.subject),0);
  // every attempt is saved (practice too) so answers can be reviewed later
  try{ await db.collection("attempts").add({testId:EXAM.test.id,testTitle:EXAM.test.title,exam,isPractice:!!EXAM.isPractice,
      studentUid:ME.uid,studentName:ME.name,centreId:ME.centreId,score,total,correct,wrong,unattempted,
      questionOrder:order,answers,
      startedAt:firebase.firestore.Timestamp.fromMillis(EXAM.endTime-EXAM.test.duration*60000),
      submittedAt:firebase.firestore.FieldValue.serverTimestamp(),auto:!!auto}); }
  catch(e){ console.error("attempt save failed",e); }
  showResult({score,total,correct,wrong,unattempted});
}
function showResult(r){
  const p=pct(r.score,r.total);
  el("examScreen").style.display="none"; document.body.style.overflow="";
  setView(`<div class="score-hero">
      <div class="muted" style="text-transform:uppercase;letter-spacing:1px;font-weight:700;font-size:12px">${esc(EXAM.test.title)}${EXAM.isPractice?" · Practice":""}</div>
      <div class="big">${r.score}<small>/${r.total}</small></div>
      <div class="pct">${p}% scored${EXAM.isPractice?" (practice — not saved to report card)":""}</div></div>
    <div class="skpis">
      <div class="kpi c"><div class="n">${r.correct}</div><div class="l">Correct</div></div>
      <div class="kpi w"><div class="n">${r.wrong}</div><div class="l">Wrong</div></div>
      <div class="kpi u"><div class="n">${r.unattempted}</div><div class="l">Skipped</div></div>
      <div class="kpi"><div class="n">${EXAM.questions.length}</div><div class="l">Total Q</div></div></div>
    <h2 class="serif" style="font-size:22px;margin:8px 0 14px">Detailed solutions</h2><div id="solList"></div>`);
  el("solList").innerHTML=EXAM.questions.map((q,i)=>{const sel=EXAM.answers[i];
    return `<div class="card" style="margin-bottom:14px"><div class="q-meta">Q${i+1} · ${q.subject}${q.topic?" · "+q.topic:""}</div>
      <p class="q-text" style="font-size:16px;margin:6px 0 14px">${qLabel(q)}</p>
      ${q.options.map((o,k)=>{let c="";if(k===q.correct)c="correct";else if(k===sel)c="wrong";
        return `<div class="opt ${c}" style="cursor:default;padding:10px 14px;margin-bottom:8px"><div class="k">${"ABCD"[k]}</div><div>${esc(o)} ${k===sel?'<b style="font-size:12px">· your answer</b>':''}</div></div>`;}).join("")}
      ${q.solution?`<div class="solution"><b>Solution:</b> ${esc(q.solution)}</div>`:""}</div>`;}).join("");
}
async function reviewAttempt(attemptId){
  const a=(await db.collection("attempts").doc(attemptId).get()).data();
  let order=a.questionOrder, answersArr=a.answers;
  if(!order){ // older attempt without saved order — fall back to the test's question list
    const t=await db.collection("tests").doc(a.testId).get();
    if(!t.exists){ alert("Saved answers aren't available for this older attempt."); return; }
    order=t.data().questionIds;
  }
  const qDocs=await Promise.all(order.map(id=>db.collection("questions").doc(id).get()));
  const questions=qDocs.filter(d=>d.exists).map(d=>({id:d.id,...d.data()}));
  const answers={}; if(answersArr) answersArr.forEach((v,i)=>{ if(v!==null&&v!==undefined) answers[i]=v; });
  EXAM={test:{title:a.testTitle,exam:a.exam},questions,answers,isPractice:!!a.isPractice};
  showResult({score:a.score,total:a.total,correct:a.correct,wrong:a.wrong,unattempted:a.unattempted});
}

/* ============================================================
   13. STAFF VIEW OF TEST RESULTS
   ============================================================ */
async function viewTestResults(testId){
  const t=(await db.collection("tests").doc(testId).get()).data();
  const snap=await db.collection("attempts").where("testId","==",testId).orderBy("score","desc").get();
  modal(`<button class="x" onclick="closeModal()">×</button><h2>${esc(t.title)} — results</h2>
    ${snap.empty?emptyState("No attempts yet","No students have taken this test."):
      tableHTML(["Rank","Student","Centre","Score","%"],snap.docs.map((d,i)=>{const a=d.data();return [`#${i+1}`,esc(a.studentName),centreName(a.centreId),`${a.score}/${a.total}`,pct(a.score,a.total)+"%"];}))}`,true);
}

/* ============================================================
   14. HELPERS
   ============================================================ */
function el(id){return document.getElementById(id);}
function val(id){return el(id)?.value ?? "";}
function setView(html){el("view").innerHTML=html;window.scrollTo(0,0);}
function setBtn(id,disabled,html){const b=el(id);if(b){b.disabled=disabled;b.innerHTML=html;}}
function authMsg(t,k){const m=el("authMsg");m.className="msg "+k;m.textContent=t;}
function setMsg(id,t,k){const m=el(id);if(m){m.className="msg "+k;m.textContent=t;}}
function esc(s){return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function truncate(s,n){s=(s||"");return s.length>n?s.slice(0,n)+"…":s;}
function pad(n){return n<10?"0"+n:n;}
function pct(a,b){return b?Math.round(a/b*100):0;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function fmtDate(ts,short){if(!ts)return"—";const d=ts.toDate?ts.toDate():new Date(ts);return short?d.toLocaleDateString():d.toLocaleString([],{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});}
function tag(t){return `<span class="tag" style="background:#ece9e0;color:var(--ink-soft)">${esc(t)}</span>`;}
function examTag(e){return `<span class="tag exam">${esc(e||"—")}</span>`;}
function subjTag(s){const c={Physics:"phy",Chemistry:"chem",Mathematics:"math",Biology:"bio",Botany:"bot",Zoology:"zoo"}[s]||"";return `<span class="tag ${c}">${esc(s)}</span>`;}
function subjChips(arr){return (arr||[]).map(subjTag).join(" ");}
function tableHTML(head,rows){return `<table><thead><tr>${head.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`;}
function emptyState(t,s){return `<div class="empty"><div class="ico">◔</div><h3 class="serif" style="margin:10px 0 4px">${t}</h3><p class="muted">${s}</p></div>`;}
function errBox(e){return `<div class="note">Couldn't load: ${esc(errMsg(e))}. ${/index/i.test(e.message||"")?'A Firestore index may be needed — click the link in the browser console (F12) to create it, then reload.':''}</div>`;}
function errMsg(e){return (e&&e.message)||String(e);}
function modal(html,wide){el("modalBox").className="modal"+(wide?" wide":"");el("modalBox").innerHTML=html;el("modalBg").classList.add("show");}
function closeModal(){el("modalBg").classList.remove("show");}
function classSelect(id,withAll=true){return `<select id="${id}">${withAll?'<option value="all">All</option>':''}<option value="11">Class 11</option><option value="12">Class 12</option></select>`;}
function difficultySelect(id,withAny=false){return `<select id="${id}">${withAny?'<option value="">Any</option>':''}${DIFFICULTIES.map(d=>`<option>${d}</option>`).join("")}</select>`;}
function difficultyChecks(cls){return DIFFICULTIES.map(d=>`<label style="margin:0;display:flex;gap:6px;align-items:center;width:48%"><input type="checkbox" class="${cls}" value="${esc(d)}" style="width:auto"/> ${esc(d)}</label>`).join("");}
function clsLabel(c){return c==="both"?"11 & 12":c;}
function testClassMatches(t,cls){return t.class===cls||t.class==="both";}
function examSelect(id){return `<select id="${id}">${EXAM_KEYS.map(e=>`<option>${e}</option>`).join("")}</select>`;}
function fillSubjects(examId,subjId,withAll,stream){
  const exam=val(examId); let subs=stream?EXAMS[exam].streams[stream]||examSubjects(exam):examSubjects(exam);
  el(subjId).innerHTML=(withAll?'<option value="all">All subjects</option>':'')+subs.map(s=>`<option>${s}</option>`).join("");
}
function fillStreams(examId,streamId){const exam=val(examId);el(streamId).innerHTML=streamsFor(exam).map(s=>`<option>${s}</option>`).join("");}
function fillTopics(examId,clsVal,subjId,topicId,withAny){const list=topicsFor(val(examId),clsVal,val(subjId));el(topicId).innerHTML=(withAny?'<option value="any">Any topic</option>':'')+list.map(t=>`<option>${esc(t)}</option>`).join("");}
function windowLabel(t){if(!t.startAt&&!t.endAt)return"Always open";return `${t.startAt?fmtDate(t.startAt):"—"} → ${t.endAt?fmtDate(t.endAt):"—"}`;}
function testStatus(t){const now=Date.now();const s=t.startAt?.toDate?.().getTime(),e=t.endAt?.toDate?.().getTime();if(s&&now<s)return"scheduled";if(e&&now>e)return"closed";return"open";}
function testStatusTag(t){const st=testStatus(t);return `<span class="tag ${st}">${st}</span>`;}
function prettyAuthErr(e){const m={"auth/invalid-credential":"Wrong email or password.","auth/user-not-found":"No account with that email.","auth/wrong-password":"Incorrect password.","auth/invalid-email":"That email looks invalid.","auth/too-many-requests":"Too many tries — wait a moment."};return m[e.code]||e.message;}

/* ============================================================
   15. FIRST-TIME SETUP — run bootstrapMaster() in console once
   ============================================================ */
async function bootstrapMaster(){
  const email=prompt("Master email:"),pass=prompt("Master password (6+ chars):"),name=prompt("Your name:")||"Dr. Pritam Bhangale";
  if(!email||!pass) return;
  try{
    const cred=await auth.createUserWithEmailAndPassword(email,pass);
    await db.collection("users").doc(cred.user.uid).set({role:"master",name,email,centreId:"all",createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    alert("Master account created. You're signed in.");
  }catch(e){ alert("Setup failed: "+e.message); }
}
window.bootstrapMaster=bootstrapMaster;
</script>
